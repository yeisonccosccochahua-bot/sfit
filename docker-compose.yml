services:
  postgres:
    image: postgres:16-alpine
    container_name: sfit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sfit_db
      POSTGRES_USER: sfit_user
      POSTGRES_PASSWORD: sfit_pass_2026
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sfit_user -d sfit_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sfit_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
